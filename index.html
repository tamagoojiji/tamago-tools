<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たまごツール</title>
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <div class="screen">
    <div class="container">
      <div class="top-hero">
        <img src="images/icon.png" alt="たまご" class="top-icon">
        <h1 class="top-logo">たまご<span>ツール</span></h1>
        <p class="top-subtitle">個人事業主のための時短アプリ</p>
      </div>
      <div class="app-cards">
        <a href="apps/invoice/" class="app-card">
          <div class="app-card-icon">📄</div>
          <div class="app-card-title">請求書ツール</div>
          <div class="app-card-desc">品目と金額を入力するだけ。プロ品質の請求書PDFをワンタップで作成。</div>
          <span class="app-card-tag">NEW</span>
        </a>
        <a href="apps/receipt-tracker/" class="app-card">
          <div class="app-card-icon">🧾</div>
          <div class="app-card-title">レシート経費記録</div>
          <div class="app-card-desc">レシートを撮るだけでAIが自動仕分け。月次のカテゴリ別集計で経費を見える化。</div>
        </a>
      </div>
      <div class="footer" style="margin-top:32px">
        <a href="https://www.instagram.com/tamago.app" target="_blank">@tamago.app</a>
      </div>
    </div>
  </div>
</body>
</html>
